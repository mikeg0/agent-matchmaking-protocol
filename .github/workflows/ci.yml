name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  openapi-drift:
    name: OpenAPI drift check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify shared model drift
        run: python3 scripts/check_openapi_drift.py

  python:
    name: Python (pytest + mypy)
    runs-on: ubuntu-latest
    needs: openapi-drift
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest mypy

      - name: Run tests
        run: pytest -q

      - name: Run type checks
        run: mypy amp_sdk

  go:
    name: Go (test + vet)
    runs-on: ubuntu-latest
    needs: openapi-drift
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.mod

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    needs: openapi-drift
    defaults:
      run:
        working-directory: rust/amp-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --all-targets

      - name: Cargo test
        run: cargo test --all-targets

  java:
    name: Java (mvn test)
    runs-on: ubuntu-latest
    needs: openapi-drift
    defaults:
      run:
        working-directory: java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B test
